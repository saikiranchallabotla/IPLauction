<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 Fantasy Auction</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --primary: #1a237e;
            --primary-light: #3949ab;
            --accent: #ffd700;
            --success: #2e7d32;
            --danger: #c62828;
            --warning: #f57c00;
            --dark: #0d1117;
            --card: #1a1f2e;
            --border: #30363d;
            --text: #ffffff;
            --text-secondary: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }

        .nav-btns { display: flex; gap: 0.5rem; }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-secondary { background: var(--border); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Views */
        .view { display: none; }
        .view.active { display: block; }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .card-title {
            color: var(--accent);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }

        /* Auction Display */
        .auction-display {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 16px;
            padding: 3rem;
            text-align: center;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .status-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .status-waiting { background: var(--border); }
        .status-bidding { background: var(--warning); animation: pulse 1s infinite; }
        .status-sold { background: var(--success); }
        .status-unsold { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .player-name {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .player-details {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 1rem;
        }

        .player-base {
            font-size: 1.3rem;
            color: white;
        }

        .player-base span { color: var(--accent); font-weight: 700; }

        .bid-info {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }

        .bid-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        .bid-amount {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        .bid-team {
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
        }

        /* Teams List */
        .teams-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .team-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--dark);
            border-radius: 8px;
            border-left: 4px solid var(--primary-light);
        }

        .team-item.current-bidder {
            border-left-color: var(--accent);
            background: rgba(255,215,0,0.1);
        }

        .team-name { font-weight: 600; }
        .team-budget { color: var(--accent); font-weight: 700; }
        .team-budget.low { color: var(--danger); }

        /* Admin Panel */
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 1.5rem;
            padding: 1.5rem;
        }

        .players-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .player-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            background: var(--dark);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .player-item:hover { border-color: var(--primary-light); }
        .player-item.selected { border-color: var(--accent); background: rgba(255,215,0,0.1); }

        .player-info .name { font-weight: 600; }
        .player-info .role { font-size: 0.85rem; color: var(--text-secondary); }
        .player-price { color: var(--accent); font-weight: 600; }

        /* Bid Controls */
        .bid-controls {
            background: var(--dark);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
        }

        .btn-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn-group .btn { flex: 1; min-width: 100px; }

        /* Filters */
        .filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .filters select, .filters input {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--dark);
            color: var(--text);
            flex: 1;
            min-width: 120px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Sold Overlay */
        .sold-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .sold-overlay.active { display: flex; }

        .sold-content {
            text-align: center;
            animation: soldPop 0.5s ease-out;
        }

        @keyframes soldPop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .sold-content h1 {
            font-size: 5rem;
            color: var(--success);
            text-shadow: 0 0 30px rgba(46,125,50,0.5);
        }

        .sold-content .player { font-size: 2rem; color: var(--accent); margin: 0.5rem 0; }
        .sold-content .team { font-size: 1.5rem; color: var(--primary-light); }
        .sold-content .price { font-size: 1.3rem; color: white; }

        /* History */
        .history-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-box {
            background: var(--dark);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        /* Team Management */
        .team-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .team-form input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--dark);
            color: var(--text);
        }

        .team-management-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: var(--dark);
            border-radius: 8px;
            margin-bottom: 0.5rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            background: var(--dark);
            border: none;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .tab.active { background: var(--primary-light); color: white; }

        /* Price dropdown in player list */
        .price-select {
            padding: 0.4rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--card);
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
        }

        .player-item-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.6rem 0.75rem;
            background: var(--dark);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            gap: 0.5rem;
        }

        .player-item-admin .player-info { flex: 1; }
        .player-item-admin .ipl-team {
            font-size: 0.75rem;
            color: var(--warning);
            font-weight: 500;
        }

        .ipl-team-badge {
            background: rgba(255, 111, 0, 0.2);
            color: var(--warning);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
            .admin-grid { grid-template-columns: 1fr; }
            .history-stats { grid-template-columns: repeat(2, 1fr); }
            .bid-info { flex-direction: column; gap: 1rem; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">IPL 2026 Fantasy Auction</div>
        <div class="nav-btns">
            <button class="btn btn-secondary" onclick="showView('auction')">Live Auction</button>
            <button class="btn btn-secondary" onclick="showView('history')">History</button>
            <button class="btn btn-primary" onclick="showAdminModal()">Admin</button>
        </div>
    </header>

    <!-- Auction View -->
    <div id="auction-view" class="view active">
        <div class="main-layout">
            <div>
                <div class="auction-display" id="auction-display">
                    <span class="status-badge status-waiting" id="status-badge">Waiting</span>
                    <div id="auction-content">
                        <div class="player-name">Waiting for Auction</div>
                        <div class="player-details">Admin will start the auction shortly</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3 class="card-title">Teams & Budgets</h3>
                <div class="teams-list" id="teams-display"></div>
            </div>
        </div>
    </div>

    <!-- Admin View -->
    <div id="admin-view" class="view">
        <div class="admin-grid">
            <!-- Left: Player Selection -->
            <div class="card">
                <div class="tabs" style="margin-bottom: 1rem;">
                    <button class="tab active" onclick="showAdminTab('auction', this)">Run Auction</button>
                    <button class="tab" onclick="showAdminTab('prices', this)">Set Prices</button>
                </div>

                <!-- Auction Tab -->
                <div id="admin-auction-tab">
                    <h3 class="card-title">Select Player</h3>
                    <div class="filters">
                        <select id="filter-role" onchange="filterPlayers()">
                            <option value="">All Roles</option>
                            <option value="Batsman">Batsman</option>
                            <option value="Bowler">Bowler</option>
                            <option value="All-rounder">All-rounder</option>
                            <option value="Wicket-keeper">Wicket-keeper</option>
                        </select>
                        <select id="filter-country" onchange="filterPlayers()">
                            <option value="">All Countries</option>
                            <option value="India">India</option>
                            <option value="overseas">Overseas</option>
                        </select>
                        <input type="text" id="search-player" placeholder="Search..." oninput="filterPlayers()">
                    </div>
                    <div class="players-list" id="players-list"></div>
                </div>

                <!-- Set Prices Tab -->
                <div id="admin-prices-tab" style="display: none;">
                    <h3 class="card-title">Set Base Prices for Players</h3>
                    <div class="filters">
                        <select id="filter-role-price" onchange="filterPlayersPrice()">
                            <option value="">All Roles</option>
                            <option value="Batsman">Batsman</option>
                            <option value="Bowler">Bowler</option>
                            <option value="All-rounder">All-rounder</option>
                            <option value="Wicket-keeper">Wicket-keeper</option>
                        </select>
                        <input type="text" id="search-player-price" placeholder="Search..." oninput="filterPlayersPrice()">
                    </div>
                    <div class="players-list" id="players-price-list" style="max-height: 500px;"></div>
                </div>
            </div>

            <!-- Right: Controls -->
            <div>
                <div class="card" style="margin-bottom: 1rem;">
                    <h3 class="card-title">Current Player</h3>
                    <div class="auction-display" id="admin-current-player" style="min-height: 200px; padding: 1.5rem;">
                        <div class="player-name" style="font-size: 1.8rem;">No Player Selected</div>
                    </div>
                </div>

                <div class="card" style="margin-bottom: 1rem;">
                    <h3 class="card-title">Bid Controls</h3>
                    <div class="bid-controls">
                        <div class="form-group">
                            <label>Current Bid (Cr)</label>
                            <input type="number" id="bid-amount" step="0.1" min="0">
                        </div>
                        <div class="form-group">
                            <label>Bidding Team</label>
                            <select id="bid-team"></select>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-warning" onclick="updateBid()">Update Bid</button>
                            <button class="btn btn-success" onclick="markSold()">SOLD!</button>
                            <button class="btn btn-danger" onclick="markUnsold()">Unsold</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">Team Management</h3>
                    <div class="team-form">
                        <input type="text" id="new-team-name" placeholder="Team name">
                        <button class="btn btn-primary" onclick="addTeam()">Add Team</button>
                    </div>
                    <div id="team-management-list"></div>
                    <button class="btn btn-danger" style="width: 100%; margin-top: 1rem;" onclick="resetAuction()">Reset Auction</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History View -->
    <div id="history-view" class="view">
        <div style="padding: 1.5rem; max-width: 1200px; margin: 0 auto;">
            <div class="history-stats">
                <div class="stat-box">
                    <div class="stat-value" id="stat-sold">0</div>
                    <div class="stat-label">Players Sold</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-unsold">0</div>
                    <div class="stat-label">Unsold</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-total">0 Cr</div>
                    <div class="stat-label">Total Spent</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="stat-highest">0 Cr</div>
                    <div class="stat-label">Highest Bid</div>
                </div>
            </div>

            <div class="card">
                <div class="tabs">
                    <button class="tab active" onclick="showHistoryTab('sold', this)">Sold Players</button>
                    <button class="tab" onclick="showHistoryTab('unsold', this)">Unsold Players</button>
                </div>
                <div class="history-list" id="sold-history"></div>
                <div class="history-list" id="unsold-history" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div class="modal" id="admin-modal">
        <div class="modal-content">
            <h2 class="modal-title">Admin Login</h2>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-password" placeholder="Enter admin password">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="adminLogin()">Login</button>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <!-- Sold Overlay -->
    <div class="sold-overlay" id="sold-overlay">
        <div class="sold-content">
            <h1>SOLD!</h1>
            <div class="player" id="sold-player"></div>
            <div class="team" id="sold-team"></div>
            <div class="price" id="sold-price"></div>
        </div>
    </div>

    <script>
        const socket = io();
        let state = { teams: [], players: [], auctionState: {} };
        let selectedPlayer = null;
        let isAdmin = false;

        // Socket events
        socket.on('fullUpdate', (data) => {
            state = data;
            renderAll();
        });

        socket.on('auctionUpdate', (auctionState) => {
            state.auctionState = auctionState;
            renderAuction();
        });

        socket.on('teamsUpdated', (teams) => {
            state.teams = teams;
            renderTeams();
        });

        socket.on('playerSold', ({ player, team, price }) => {
            showSoldOverlay(player, team, price);
        });

        socket.on('playersUpdated', (players) => {
            state.players = players;
            renderPlayers();
            renderPlayersPrice();
        });

        // Render functions
        function renderAll() {
            renderAuction();
            renderTeams();
            renderPlayers();
            renderPlayersPrice();
            renderHistory();
        }

        function renderAuction() {
            const { auctionState } = state;
            const badge = document.getElementById('status-badge');
            const content = document.getElementById('auction-content');
            const adminPlayer = document.getElementById('admin-current-player');

            badge.className = 'status-badge status-' + (auctionState.status || 'waiting');
            badge.textContent = (auctionState.status || 'waiting').toUpperCase();

            if (auctionState.currentPlayer) {
                const p = auctionState.currentPlayer;
                content.innerHTML = `
                    <div class="player-name">${p.name}</div>
                    <div class="player-details">${p.role} | ${p.country} | <span class="ipl-team-badge">${p.previousTeam || 'Uncapped'}</span></div>
                    <div class="player-base">Base: <span>${formatPrice(p.basePrice)}</span></div>
                    <div class="bid-info">
                        <div>
                            <div class="bid-label">Current Bid</div>
                            <div class="bid-amount">${formatPrice(auctionState.currentBid)}</div>
                        </div>
                        <div>
                            <div class="bid-label">Leading Team</div>
                            <div class="bid-team">${auctionState.currentBidder?.name || 'No bids'}</div>
                        </div>
                    </div>
                `;

                adminPlayer.innerHTML = `
                    <div class="player-name" style="font-size: 1.8rem;">${p.name}</div>
                    <div class="player-details">${p.role} | <span class="ipl-team-badge">${p.previousTeam || 'Uncapped'}</span></div>
                    <div class="player-base">Base: <span>${formatPrice(p.basePrice)}</span></div>
                `;

                document.getElementById('bid-amount').value = auctionState.currentBid;
            } else {
                content.innerHTML = `
                    <div class="player-name">Waiting for Auction</div>
                    <div class="player-details">Admin will start the auction shortly</div>
                `;
                adminPlayer.innerHTML = `<div class="player-name" style="font-size: 1.8rem;">No Player Selected</div>`;
            }

            // Highlight current bidder
            document.querySelectorAll('.team-item').forEach(item => {
                item.classList.toggle('current-bidder',
                    auctionState.currentBidder && item.dataset.id == auctionState.currentBidder.id);
            });
        }

        function renderTeams() {
            const html = state.teams.map(t => `
                <div class="team-item" data-id="${t.id}">
                    <div>
                        <div class="team-name">${t.name}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${t.players?.length || 0} players</div>
                    </div>
                    <div class="team-budget ${t.budget < 10 ? 'low' : ''}">${t.budget.toFixed(2)} Cr</div>
                </div>
            `).join('');

            document.getElementById('teams-display').innerHTML = html || '<p style="color: var(--text-secondary);">No teams yet</p>';

            // Update team dropdown
            const select = document.getElementById('bid-team');
            select.innerHTML = '<option value="">Select Team</option>' +
                state.teams.map(t => `<option value="${t.id}">${t.name} (${t.budget.toFixed(2)} Cr)</option>`).join('');

            // Team management list
            const mgmtHtml = state.teams.map(t => `
                <div class="team-management-item">
                    <div>
                        <div class="team-name">${t.name}</div>
                        <div style="font-size: 0.8rem; color: var(--text-secondary);">${t.budget.toFixed(2)} Cr remaining</div>
                    </div>
                    <button class="delete-btn" onclick="deleteTeam(${t.id})">✕</button>
                </div>
            `).join('');
            document.getElementById('team-management-list').innerHTML = mgmtHtml;
        }

        function renderPlayers() {
            filterPlayers();
        }

        function filterPlayers() {
            const role = document.getElementById('filter-role').value;
            const country = document.getElementById('filter-country').value;
            const search = document.getElementById('search-player').value.toLowerCase();

            let filtered = state.players.filter(p => p.status === 'available');

            if (role) filtered = filtered.filter(p => p.role === role);
            if (country === 'India') filtered = filtered.filter(p => p.country === 'India');
            if (country === 'overseas') filtered = filtered.filter(p => p.country !== 'India');
            if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));

            const html = filtered.map(p => `
                <div class="player-item ${selectedPlayer?.id === p.id ? 'selected' : ''}" onclick="selectPlayer(${p.id})">
                    <div class="player-info">
                        <div class="name">${p.name} <span class="ipl-team-badge">${p.previousTeam || 'Uncapped'}</span></div>
                        <div class="role">${p.role} | ${p.country}</div>
                    </div>
                    <div class="player-price">${formatPrice(p.basePrice)}</div>
                </div>
            `).join('');

            document.getElementById('players-list').innerHTML = html || '<p style="color: var(--text-secondary); padding: 1rem;">No players available</p>';
        }

        function renderPlayersPrice() {
            filterPlayersPrice();
        }

        function filterPlayersPrice() {
            const role = document.getElementById('filter-role-price')?.value || '';
            const search = (document.getElementById('search-player-price')?.value || '').toLowerCase();

            let filtered = state.players.filter(p => p.status === 'available');

            if (role) filtered = filtered.filter(p => p.role === role);
            if (search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search));

            const html = filtered.map(p => `
                <div class="player-item-admin">
                    <div class="player-info">
                        <div class="name">${p.name}</div>
                        <div class="role">${p.role} | <span class="ipl-team">${p.previousTeam || 'Uncapped'}</span></div>
                    </div>
                    <select class="price-select" onchange="updatePlayerPrice(${p.id}, this.value)">
                        <option value="2" ${p.basePrice == 2 ? 'selected' : ''}>2 Cr</option>
                        <option value="1" ${p.basePrice == 1 ? 'selected' : ''}>1 Cr</option>
                        <option value="0.75" ${p.basePrice == 0.75 ? 'selected' : ''}>75 L</option>
                        <option value="0.5" ${p.basePrice == 0.5 ? 'selected' : ''}>50 L</option>
                        <option value="0.3" ${p.basePrice == 0.3 ? 'selected' : ''}>30 L</option>
                        <option value="0.2" ${p.basePrice == 0.2 ? 'selected' : ''}>20 L</option>
                    </select>
                </div>
            `).join('');

            const container = document.getElementById('players-price-list');
            if (container) {
                container.innerHTML = html || '<p style="color: var(--text-secondary); padding: 1rem;">No players available</p>';
            }
        }

        function updatePlayerPrice(playerId, price) {
            fetch('/api/players/' + playerId + '/price', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ basePrice: parseFloat(price) })
            });
        }

        function formatPrice(price) {
            if (price >= 1) {
                return price + ' Cr';
            } else {
                return (price * 100) + ' L';
            }
        }

        function renderHistory() {
            const { soldPlayers = [], unsoldPlayers = [] } = state.auctionState;

            document.getElementById('stat-sold').textContent = soldPlayers.length;
            document.getElementById('stat-unsold').textContent = unsoldPlayers.length;

            const total = soldPlayers.reduce((sum, p) => sum + (p.soldPrice || 0), 0);
            document.getElementById('stat-total').textContent = formatPrice(total);

            const highest = soldPlayers.length ? Math.max(...soldPlayers.map(p => p.soldPrice || 0)) : 0;
            document.getElementById('stat-highest').textContent = formatPrice(highest);

            document.getElementById('sold-history').innerHTML = soldPlayers.map(p => `
                <div class="history-item">
                    <div>
                        <div style="font-weight: 600;">${p.name} <span class="ipl-team-badge">${p.previousTeam || 'Uncapped'}</span></div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">${p.role}</div>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: var(--primary-light);">${p.soldToName}</div>
                        <div style="color: var(--accent); font-weight: 700;">${formatPrice(p.soldPrice)}</div>
                    </div>
                </div>
            `).join('') || '<p style="padding: 1rem; color: var(--text-secondary);">No players sold yet</p>';

            document.getElementById('unsold-history').innerHTML = unsoldPlayers.map(p => `
                <div class="history-item">
                    <div>
                        <div style="font-weight: 600;">${p.name} <span class="ipl-team-badge">${p.previousTeam || 'Uncapped'}</span></div>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">${p.role}</div>
                    </div>
                    <div style="color: var(--danger);">Unsold</div>
                </div>
            `).join('') || '<p style="padding: 1rem; color: var(--text-secondary);">No unsold players</p>';
        }

        // Actions
        function selectPlayer(id) {
            selectedPlayer = state.players.find(p => p.id === id);
            socket.emit('selectPlayer', id);
            renderPlayers();
        }

        function updateBid() {
            const amount = parseFloat(document.getElementById('bid-amount').value);
            const teamId = parseInt(document.getElementById('bid-team').value);
            if (amount && teamId) {
                socket.emit('updateBid', { amount, teamId });
            }
        }

        function markSold() {
            socket.emit('markSold');
        }

        function markUnsold() {
            socket.emit('markUnsold');
        }

        function addTeam() {
            const name = document.getElementById('new-team-name').value.trim();
            if (name) {
                fetch('/api/teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                document.getElementById('new-team-name').value = '';
            }
        }

        function deleteTeam(id) {
            if (confirm('Delete this team?')) {
                fetch('/api/teams/' + id, { method: 'DELETE' });
            }
        }

        function resetAuction() {
            if (confirm('Reset entire auction? This will restore all budgets and make all players available again.')) {
                fetch('/api/reset', { method: 'POST' });
            }
        }

        // View management
        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(view + '-view').classList.add('active');
        }

        function showAdminModal() {
            showView('admin');
        }

        function closeModal() {
            document.getElementById('admin-modal').classList.remove('active');
        }

        async function adminLogin() {
            showView('admin');
        }

        function showHistoryTab(tab, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('sold-history').style.display = tab === 'sold' ? 'block' : 'none';
            document.getElementById('unsold-history').style.display = tab === 'unsold' ? 'block' : 'none';
        }

        function showAdminTab(tab, btn) {
            btn.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('admin-auction-tab').style.display = tab === 'auction' ? 'block' : 'none';
            document.getElementById('admin-prices-tab').style.display = tab === 'prices' ? 'block' : 'none';
            if (tab === 'prices') renderPlayersPrice();
        }

        function showSoldOverlay(player, team, price) {
            document.getElementById('sold-player').textContent = player.name;
            document.getElementById('sold-team').textContent = 'to ' + team.name;
            document.getElementById('sold-price').textContent = 'for ' + price + ' Cr';
            document.getElementById('sold-overlay').classList.add('active');

            setTimeout(() => {
                document.getElementById('sold-overlay').classList.remove('active');
            }, 3000);
        }

        // Enter key for password
        document.getElementById('admin-password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });
    </script>
</body>
</html>
